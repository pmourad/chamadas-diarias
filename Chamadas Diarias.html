  <style>
/* ============ Chamadas Diárias — design tokens ============ */
:root {
  --bg: oklch(0.993 0.003 80);
  --bg-sunk: oklch(0.978 0.004 80);
  --surface: #ffffff;
  --line: oklch(0.93 0.005 80);
  --line-soft: oklch(0.955 0.004 80);

  --ink-1: oklch(0.22 0.01 260);
  --ink-2: oklch(0.45 0.01 260);
  --ink-3: oklch(0.62 0.01 260);
  --ink-4: oklch(0.78 0.008 260);

  --mint-bg:      oklch(0.94 0.055 155);
  --mint-fg:      oklch(0.42 0.09 155);
  --mint-dot:     oklch(0.72 0.13 155);

  --lavender-bg: oklch(0.94 0.055 285);
  --lavender-fg: oklch(0.42 0.12 285);
  --lavender-dot:oklch(0.68 0.15 285);

  --blush-bg:    oklch(0.94 0.055 15);
  --blush-fg:    oklch(0.46 0.12 15);
  --blush-dot:   oklch(0.72 0.15 15);

  --peach-bg:    oklch(0.94 0.055 55);
  --peach-fg:    oklch(0.48 0.12 55);
  --peach-dot:   oklch(0.76 0.14 55);

  --sky-bg:      oklch(0.94 0.055 230);
  --sky-fg:      oklch(0.44 0.11 230);
  --sky-dot:     oklch(0.7 0.13 230);

  --butter-bg:   oklch(0.95 0.055 95);
  --butter-fg:   oklch(0.48 0.11 95);
  --butter-dot:  oklch(0.78 0.13 95);

  --sand-bg:     oklch(0.94 0.02 75);
  --sand-fg:     oklch(0.42 0.03 75);

  --r-xs: 8px;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;

  --shadow-card: 0 1px 2px rgba(20, 20, 40, 0.04), 0 8px 24px -12px rgba(20, 20, 40, 0.08);
  --shadow-pop:  0 2px 4px rgba(20, 20, 40, 0.05), 0 20px 48px -16px rgba(20, 20, 40, 0.18);
  --shadow-hair: 0 1px 0 rgba(20, 20, 40, 0.02), inset 0 0 0 1px var(--line);

  --font-sans: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: var(--font-sans);
  color: var(--ink-1);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11";
  letter-spacing: -0.005em;
}

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; color: inherit; }
textarea { resize: none; }

.scroll { scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
.scroll::-webkit-scrollbar { width: 6px; height: 6px; }
.scroll::-webkit-scrollbar-track { background: transparent; }
.scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }

.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 500;
  line-height: 1;
  white-space: nowrap;
}
.chip-sm { padding: 3px 8px; font-size: 11px; }

.dot {
  width: 7px;
  height: 7px;
  border-radius: 99px;
  flex-shrink: 0;
}

.squircle-icon {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  background: var(--bg-sunk);
  border: 1px solid var(--line-soft);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-3);
  flex-shrink: 0;
}
.squircle-icon svg { width: 16px; height: 16px; }

.inline-edit {
  background: transparent;
  border: 1px solid transparent;
  border-radius: 8px;
  padding: 4px 8px;
  margin: -4px -8px;
  transition: all 140ms ease;
  width: 100%;
  outline: none;
  color: inherit;
  font: inherit;
  letter-spacing: inherit;
}
.inline-edit:hover {
  background: var(--bg-sunk);
  border-color: var(--line-soft);
}
.inline-edit:focus {
  background: #fff;
  border-color: var(--sky-dot);
  box-shadow: 0 0 0 3px oklch(0.94 0.055 230 / 0.6);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 600;
  transition: all 140ms ease;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink-1);
}
.btn:hover { background: var(--bg-sunk); }
.btn-primary {
  background: var(--ink-1);
  color: #fff;
  border-color: var(--ink-1);
}
.btn-primary:hover { background: oklch(0.3 0.01 260); }
.btn-ghost {
  border-color: transparent;
  color: var(--ink-2);
}
.btn-ghost:hover { background: var(--bg-sunk); color: var(--ink-1); }

.outcome {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  line-height: 1;
  transition: all 160ms ease;
  border: 1px solid transparent;
  cursor: pointer;
  white-space: nowrap;
}
.outcome .emoji { font-size: 14px; }
.outcome:hover { transform: translateY(-1px); }
.outcome.active { box-shadow: 0 0 0 2px currentColor; }

.tint-mint     { background: var(--mint-bg);     color: var(--mint-fg); }
.tint-lavender { background: var(--lavender-bg); color: var(--lavender-fg); }
.tint-blush    { background: var(--blush-bg);    color: var(--blush-fg); }
.tint-peach    { background: var(--peach-bg);    color: var(--peach-fg); }
.tint-sky      { background: var(--sky-bg);      color: var(--sky-fg); }
.tint-butter   { background: var(--butter-bg);   color: var(--butter-fg); }
.tint-sand     { background: var(--sand-bg);     color: var(--sand-fg); }

.tint-subtle-mint     { background: color-mix(in oklab, var(--mint-bg) 40%, #fff); color: var(--mint-fg); }
.tint-subtle-lavender { background: color-mix(in oklab, var(--lavender-bg) 40%, #fff); color: var(--lavender-fg); }
.tint-subtle-blush    { background: color-mix(in oklab, var(--blush-bg) 40%, #fff); color: var(--blush-fg); }
.tint-subtle-peach    { background: color-mix(in oklab, var(--peach-bg) 40%, #fff); color: var(--peach-fg); }
.tint-subtle-sky      { background: color-mix(in oklab, var(--sky-bg) 40%, #fff); color: var(--sky-fg); }
.tint-subtle-butter   { background: color-mix(in oklab, var(--butter-bg) 40%, #fff); color: var(--butter-fg); }
.tint-subtle-sand     { background: color-mix(in oklab, var(--sand-bg) 40%, #fff); color: var(--sand-fg); }

.modal-backdrop {
  position: fixed; inset: 0;
  background: oklch(0.22 0.01 260 / 0.32);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 160ms ease;
}
.modal {
  background: #fff;
  border-radius: 20px;
  box-shadow: var(--shadow-pop);
  padding: 28px;
  min-width: 440px;
  max-width: 520px;
  animation: modalIn 200ms cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes modalIn {
  from { opacity: 0; transform: translateY(8px) scale(0.98); }
  to { opacity: 1; transform: none; }
}

.card {
  background: #fff;
  border-radius: 20px;
  border: 1px solid var(--line-soft);
  box-shadow: var(--shadow-card);
  position: relative;
  transition: box-shadow 200ms ease, transform 200ms ease;
}
.card:hover { box-shadow: 0 2px 3px rgba(20,20,40,0.05), 0 16px 40px -18px rgba(20,20,40,0.14); }

.reminder-pill {
  position: absolute;
  top: -16px;
  left: 32px;
  background: var(--peach-bg);
  border: 1.5px solid var(--peach-dot);
  padding: 7px 14px 7px 10px;
  border-radius: 99px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 700;
  color: var(--peach-fg);
  box-shadow: 0 2px 8px -2px oklch(0.76 0.14 55 / 0.35);
  z-index: 2;
}

.status-badge {
  position: absolute;
  top: -14px;
  right: 24px;
  z-index: 2;
}

.divider-v { width: 1px; background: var(--line-soft); align-self: stretch; }
.divider-h { height: 1px; background: var(--line-soft); }

.tweaks {
  position: fixed;
  right: 24px;
  bottom: 24px;
  width: 320px;
  max-height: calc(100vh - 48px);
  background: #fff;
  border-radius: 20px;
  box-shadow: var(--shadow-pop);
  border: 1px solid var(--line-soft);
  z-index: 80;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.tweaks-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--line-soft);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tweaks-body {
  padding: 16px 20px 20px;
  overflow-y: auto;
}
.tweaks-section { margin-bottom: 18px; }
.tweaks-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  margin-bottom: 8px;
}
.tweak-options {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.tweak-opt {
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  background: var(--bg-sunk);
  border: 1px solid transparent;
  color: var(--ink-2);
  transition: all 140ms ease;
}
.tweak-opt:hover { background: #fff; border-color: var(--line); }
.tweak-opt.active { background: var(--ink-1); color: #fff; }

:focus-visible {
  outline: none;
  box-shadow: 0 0 0 3px oklch(0.94 0.055 230 / 0.6);
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString("pt-PT", { hour: "2-digit", minute: "2-digit" });
}
function formatDateTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  const yest = new Date(now.getTime() - 86400_000);
  const isYest = d.toDateString() === yest.toDateString();
  const time = formatTime(ts);
  if (sameDay) return `Hoje, ${time}`;
  if (isYest) return `Ontem, ${time}`;
  return d.toLocaleDateString("pt-PT", { day: "2-digit", month: "short" }) + `, ${time}`;
}
function formatRelative(ts) {
  const diff = ts - Date.now();
  const abs = Math.abs(diff);
  const min = Math.round(abs / 60_000);
  if (min < 1) return diff >= 0 ? "agora" : "agora mesmo";
  if (min < 60) return diff >= 0 ? `em ${min} min` : `há ${min} min`;
  const h = Math.round(min / 60);
  if (h < 24) return diff >= 0 ? `em ${h}h` : `há ${h}h`;
  const d = Math.round(h / 24);
  return diff >= 0 ? `em ${d}d` : `há ${d}d`;
}
function formatFullDatePT() {
  const d = new Date();
  const days = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
  const months = ["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
  return `${days[d.getDay()]}, ${d.getDate()} de ${months[d.getMonth()]}`;
}

  return (

}

  <script type="text/babel">
// ============ Audio ============
function playChime() {
  const ctx = window._audioCtx;
  if (!ctx) return;
  const notes = [659.25, 783.99]; // E5, G5 — soft two-tone chime
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = "sine";
    osc.frequency.value = freq;
    const t = ctx.currentTime + i * 0.22;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.15, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    osc.start(t);
    osc.stop(t + 0.65);
  });
}

function App() {
  const [state, setState] = useState({ cards: [] });
  const [isLoading, setIsLoading] = useState(true);
  const [saveStatus, setSaveStatus] = useState("saved"); // "saved" | "saving"
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState({ status: "all", platform: "all", reminder: false });
  const [reminderFor, setReminderFor] = useState(null);
  const [firedReminder, setFiredReminder] = useState(null);
  const [collapsedIds, setCollapsedIds] = useState(new Set());
  const stateRef = useRef(state);
  const saveTimer = useRef(null);
  const isFirstLoad = useRef(true);

  const DENSITY = "balanced";
  const OUTCOME_VARIANT = "white";
  const STATUS_SET = "extended";

  // Load from Supabase on mount
  useEffect(() => {
    window.loadState().then(loaded => {
      setState(loaded);
      stateRef.current = loaded;
      setIsLoading(false);
    });
  }, []);

  // Debounced save — waits 1.5s after last change before writing to Supabase
  useEffect(() => {
    stateRef.current = state;
    if (isFirstLoad.current) { isFirstLoad.current = false; return; }
    setSaveStatus("saving");
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => {
      window.saveState(state).then(() => setSaveStatus("saved"));
    }, 1500);
    return () => clearTimeout(saveTimer.current);
  }, [state]);

  // Unlock audio on first interaction, then poll for fired reminders
  useEffect(() => {
    const unlock = () => {
      if (!window._audioCtx) {
        window._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      document.removeEventListener("click", unlock, true);
    };
    document.addEventListener("click", unlock, true);

    const iv = setInterval(() => {
      const now = Date.now();
      const fired = stateRef.current.cards.find(
        c => c.reminder && c.reminder.at && c.reminder.at <= now
      );
      if (fired) {
        setFiredReminder(prev => prev || fired);
        playChime();
        // Send SMS to friend
        fetch("https://sms-reminder-1924.twil.io/welcome", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            body: `🔔 Lembrete: ${fired.reminder?.label || "tens uma chamada pendente"}${fired.seller ? " — " + fired.seller : ""}${fired.phone ? " (" + fired.phone + ")" : ""}`,
          }),
        }).catch(() => {}); // fail silently if SMS doesn't go through
      }
    }, 10_000);

    return () => {
      document.removeEventListener("click", unlock, true);
      clearInterval(iv);
    };
  }, []);

  const updateCard = (updated) => {
    setState(s => ({ ...s, cards: s.cards.map(c => c.id === updated.id ? updated : c) }));
  };
  const deleteCard = (id) => {
    if (!confirm("Eliminar esta ficha?")) return;
    setState(s => ({ ...s, cards: s.cards.filter(c => c.id !== id) }));
  };
  const registerCall = (id) => {};
  const requestReminder = (cardId, outcome) => {
    setReminderFor({ cardId, outcome });
  };
  const confirmReminder = (reminder) => {
    const cardId = reminderFor.cardId;
    setState(s => ({
      ...s,
      cards: s.cards.map(c => c.id === cardId ? { ...c, reminder } : c),
    }));
    setReminderFor(null);
  };

  const addCard = () => {
    const n = state.cards.length + 1;
    const newCard = {
      id: `c${Date.now()}`,
      ref: "",
      seller: "",
      phone: "",
      platform: "idealista",
      listingUrl: "",
      listingTitle: "",
      notes: "",
      history: [],
      status: "pendente",
      reminder: null,
      createdAt: Date.now(),
    };
    setState(s => ({ ...s, cards: [newCard, ...s.cards] }));
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const d = new Date().toISOString().split("T")[0];
    a.download = `chamadas-${d}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importJSON = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.cards && Array.isArray(data.cards)) {
          setState(data);
        }
      } catch (err) { alert("Ficheiro inválido"); }
    };
    reader.readAsText(file);
  };

  const filtered = state.cards.filter(c => {
    if (search) {
      const q = search.toLowerCase();
      if (!(c.seller?.toLowerCase().includes(q) || c.phone?.includes(q) || c.ref?.toLowerCase().includes(q) || c.listingTitle?.toLowerCase().includes(q))) {
        return false;
      }
    }
    if (filter.platform !== "all" && c.platform !== filter.platform) return false;
    if (filter.status !== "all") {
      const last = c.history[c.history.length - 1];
      const key = c.status || last?.outcome;
      if (key !== filter.status) return false;
    }
    if (filter.reminder && !(c.reminder && c.reminder.at)) return false;
    return true;
  });

  const toggleCollapse = (id) => {
    setCollapsedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const isCollapsed = (id) => collapsedIds.has(id);

  const allCollapsed = filtered.length > 0 && filtered.every(c => collapsedIds.has(c.id));

  const toggleCollapseAll = () => {
    if (allCollapsed) {
      setCollapsedIds(prev => {
        const next = new Set(prev);
        filtered.forEach(c => next.delete(c.id));
        return next;
      });
    } else {
      setCollapsedIds(prev => {
        const next = new Set(prev);
        filtered.forEach(c => next.add(c.id));
        return next;
      });
    }
  };

  if (isLoading) return (
    <div style={{ minHeight: "100vh", background: "var(--bg)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 16 }}>
      <div style={{ fontSize: 40 }}>📞</div>
      <div style={{ fontSize: 16, fontWeight: 600, color: "var(--ink-2)" }}>A carregar as tuas fichas…</div>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: "var(--bg)", paddingBottom: 80 }}>
      <div style={{
        position: "fixed", bottom: 16, left: "50%", transform: "translateX(-50%)",
        padding: "6px 14px", borderRadius: 99, fontSize: 12, fontWeight: 500,
        background: saveStatus === "saving" ? "var(--butter-bg)" : "var(--mint-bg)",
        color: saveStatus === "saving" ? "var(--butter-fg)" : "var(--mint-fg)",
        transition: "all 400ms ease", zIndex: 90, pointerEvents: "none",
      }}>
        {saveStatus === "saving" ? "💾 A guardar…" : "✓ Guardado"}
      </div>
      <TopBar
        state={state}
        onExport={exportJSON}
        onImport={importJSON}
        onAddCard={addCard}
        filter={filter}
        setFilter={setFilter}
        search={search}
        setSearch={setSearch}
      />
      <FilterBar filter={filter} setFilter={setFilter} state={state} />

      <div style={{ padding: "24px 40px 40px", maxWidth: 1280, margin: "0 auto", display: "flex", flexDirection: "column", gap: 18 }}>
        {filtered.length > 0 && (
          <div style={{ display: "flex", justifyContent: "flex-end" }}>
            <button
              onClick={toggleCollapseAll}
              className="btn btn-ghost"
              style={{ fontSize: 13, padding: "6px 12px", gap: 6 }}
            >
              <Icon name={allCollapsed ? "chevronDown" : "chevronUp"} size={14} />
              {allCollapsed ? "Expandir todos" : "Colapsar todos"}
            </button>
          </div>
        )}
        {filtered.length === 0 ? (
          <EmptyState onAdd={addCard} />
        ) : (
          filtered.map(card => (
            <CallCard
              key={card.id}
              card={card}
              onUpdate={updateCard}
              onDelete={deleteCard}
              onRegisterCall={registerCall}
              onRequestReminder={requestReminder}
              density={DENSITY}
              outcomeVariant={OUTCOME_VARIANT}
              statusSet={STATUS_SET}
              collapsed={isCollapsed(card.id)}
              onToggleCollapse={() => toggleCollapse(card.id)}
            />
          ))
        )}

        {filtered.length > 0 && (
          <button
            onClick={addCard}
            style={{
              border: "2px dashed var(--line)",
              background: "transparent",
              borderRadius: 20,
              padding: "32px",
              color: "var(--ink-3)",
              fontSize: 14,
              fontWeight: 500,
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              gap: 10,
              transition: "all 180ms ease",
            }}
            onMouseEnter={(e) => { e.currentTarget.style.borderColor = "var(--lavender-dot)"; e.currentTarget.style.color = "var(--lavender-fg)"; e.currentTarget.style.background = "var(--lavender-bg)"; }}
            onMouseLeave={(e) => { e.currentTarget.style.borderColor = "var(--line)"; e.currentTarget.style.color = "var(--ink-3)"; e.currentTarget.style.background = "transparent"; }}
          >
            <Icon name="plus" />
            Adicionar nova ficha
          </button>
        )}
      </div>

      {reminderFor && (
        <ReminderModal
          outcome={reminderFor.outcome}
          onConfirm={confirmReminder}
          onClose={() => setReminderFor(null)}
        />
      )}

      {firedReminder && (
        <ReminderAlertModal
          card={firedReminder}
          onDismiss={() => {
            updateCard({ ...firedReminder, reminder: null });
            setFiredReminder(null);
          }}
          onSnooze={(ms) => {
            updateCard({ ...firedReminder, reminder: { at: Date.now() + ms, label: firedReminder.reminder?.label || "Lembrete" } });
            setFiredReminder(null);
          }}
        />
      )}

    </div>
  );
}

function EmptyState({ onAdd }) {
  return (
    <div style={{
      padding: "80px 40px",
      textAlign: "center",
      background: "#fff",
      borderRadius: 20,
      border: "1px solid var(--line-soft)",
    }}>
      <div style={{
        width: 64, height: 64, borderRadius: 20,
        background: "linear-gradient(135deg, var(--lavender-bg), var(--sky-bg))",
        display: "inline-flex", alignItems: "center", justifyContent: "center",
        marginBottom: 20,
      }}>
        <Icon name="phone" size={26} />
      </div>
      <div style={{ fontSize: 18, fontWeight: 600, marginBottom: 6 }}>Sem resultados</div>
      <div style={{ fontSize: 14, color: "var(--ink-3)", marginBottom: 20 }}>Ajuste os filtros ou adicione uma nova ficha.</div>
      <button className="btn btn-primary" onClick={onAdd}>
        <Icon name="plus" size={15} />
        Nova ficha
      </button>
    </div>

}

function PasswordGate({ children }) {
  const [unlocked, setUnlocked] = useState(
    () => sessionStorage.getItem("cd-auth") === "ok"
  );
  const [input, setInput] = useState("");
  const [error, setError] = useState(false);

  const attempt = () => {
    if (input === "vanda") {
      sessionStorage.setItem("cd-auth", "ok");
      setUnlocked(true);
    } else {
      setError(true);
      setInput("");
      setTimeout(() => setError(false), 1800);
    }
  };

  if (unlocked) return children;

  return (
    <div style={{
      minHeight: "100vh", background: "var(--bg)",
      display: "flex", alignItems: "center", justifyContent: "center",
    }}>
      <div style={{
        background: "#fff", borderRadius: 24, padding: "40px 48px",
        boxShadow: "var(--shadow-pop)", textAlign: "center", width: 360,
        border: error ? "2px solid var(--blush-dot)" : "1px solid var(--line-soft)",
        transition: "border 200ms ease",
      }}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>📞</div>
        <div style={{ fontSize: 20, fontWeight: 700, marginBottom: 6 }}>Chamadas Diárias</div>
        <div style={{ fontSize: 13, color: "var(--ink-3)", marginBottom: 28 }}>
          Introduz a senha para entrar
        </div>
        <input
          type="password"
          value={input}
          placeholder="Senha"
          autoFocus
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && attempt()}
          style={{
            width: "100%", padding: "12px 16px", borderRadius: 12,
            border: `1px solid ${error ? "var(--blush-dot)" : "var(--line)"}`,
            fontSize: 15, outline: "none", marginBottom: 12,
            background: error ? "color-mix(in oklab, var(--blush-bg) 40%, #fff)" : "#fff",
            transition: "all 200ms ease", textAlign: "center", letterSpacing: "0.1em",
          }}
        />
        {error && (
          <div style={{ fontSize: 13, color: "var(--blush-fg)", marginBottom: 10, fontWeight: 500 }}>
            Senha incorrecta, tenta outra vez 🙈
          </div>
        )}
        <button
          className="btn btn-primary"
          onClick={attempt}
          style={{ width: "100%", justifyContent: "center", fontSize: 15, borderRadius: 14 }}
        >
          Entrar
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <PasswordGate><App /></PasswordGate>
);
  </script>
</body>
</html>
